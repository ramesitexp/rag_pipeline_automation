# Render Blueprint — RAG Engine Pipeline (Free Tier)
# Single web service + free managed PostgreSQL.
# ChromaDB runs embedded inside the app (no separate service needed).
#
# After deploy: set OPENAI_API_KEY in Render dashboard →
#   rag-api → Environment → OPENAI_API_KEY → Save → Manual Deploy

services:
  - type: web
    name: rag-api
    runtime: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rag-postgres
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false        # set manually in Render dashboard — never commit this
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma_data

databases:
  - name: rag-postgres
    databaseName: ragdb
    user: raguser
    plan: free
