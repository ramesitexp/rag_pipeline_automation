<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Engine | Intelligent Document Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="gradient-text">RAG</span> Engine
            </div>
            <p class="subtitle">Upload PDFs and chat with your data</p>
        </header>

        <main>
            <section class="upload-section">
                <div class="card glass">
                    <h3>Knowledge Base</h3>
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-zone-content">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p>Drag & Drop PDF or <span>Browse</span></p>
                            <input type="file" id="file-input" hidden accept=".pdf">
                        </div>
                    </div>
                    <div class="document-list" id="document-list">
                        <!-- Documents will be listed here -->
                        <p class="empty-state">No documents uploaded yet.</p>
                    </div>
                </div>
            </section>

            <section class="chat-section">
                <div class="card glass chat-card">
                    <div class="chat-header">
                        <h3>Ask Anything</h3>
                        <span id="connection-status" class="status-badge">Connected</span>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <div class="message bot-message">
                            How can I help you today? Upload a document to get started.
                        </div>
                    </div>
                    <form id="query-form" class="chat-input-area">
                        <input type="text" id="query-input" placeholder="Enter your question..." autocomplete="off">
                        <button type="submit" id="send-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </div>
            </section>
        </main>

        <div id="notification-container" class="notification-container"></div>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
